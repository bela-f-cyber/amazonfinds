<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Amazon Finds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f7f7f7;
      color: #111;
    }
    header {
      background: #111;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      font-size: 28px;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      overflow: hidden;
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card-content {
      padding: 15px;
    }
    .card h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .card p {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }
    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #ff6a00;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>🔥 Top Amazon Finds</h1>
  <p>Daily must-have products</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Product">
    <div class="card-content">
      <h2>Smart Kitchen </h2>
      <p>Saves time and makes cooking easier.</p>
      <a href="#" class="btn">Shop Now</a>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Product">
    <div class="card-content">
      <h2>LED Desk Light</h2>
      <p>Perfect lighting for your workspace.</p>
      <a href="#" class="btn">Shop Now</a>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Product">
    <div class="card-content">
      <h2>Mini Vacuum Cleaner</h2>
      <p>Keep your desk clean in seconds.</p>
      <a href="#" class="btn">Shop Now</a>
    </div>
  </div>

</div>

<footer>
  <p>Affiliate links may earn us a commission.</p>
</footer>

</body>
</html>
